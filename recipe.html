<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recipe</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f19;
  color:white;
  padding:40px;
  line-height:1.7;
}
.container{
  max-width:800px;
  margin:auto;
}
a{color:#ff6400}
</style>
</head>

<body>
<div class="container">
  <a href="index.html">← Back to home</a>
  <h1 id="title"></h1>
  <div id="content"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

if(!file){
  document.getElementById("content").innerText = "Recipe not found.";
}else{
  fetch(file)
    .then(r => r.text())
    .then(text => {
      document.getElementById("title").innerText =
        file.replace(".txt","").replace(/-/g," ");
      document.getElementById("content").innerText = text;
    })
    .catch(() => {
      document.getElementById("content").innerText = "Could not load recipe.";
    });
}
</script>
</body>
</html>
